# Дев-окружение через готовый образ Node с Docker Hub — без установки Node в систему.
# Запуск:  docker compose up
# Сайт:    http://localhost:3000
services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true # надёжный hot-reload в Docker
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ./:/app
      - /app/node_modules # node_modules живёт в контейнере, не перетирается хостом
